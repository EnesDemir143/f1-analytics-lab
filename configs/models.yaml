# Model hyperparameters
models:
  linear:
    type: Ridge
    alpha: 1.0

  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 5
    n_jobs: -1

  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8

  lightgbm:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8

  catboost:
    iterations: 300
    depth: 6
    learning_rate: 0.05
    l2_leaf_reg: 3

# Evaluation
evaluation:
  cv_folds: 5
  metrics: [rmse, mae, r2]
  temporal_split: true
  test_size: 0.2
